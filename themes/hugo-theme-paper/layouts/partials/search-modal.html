{{- $query := first 1 (where .Site.Pages "Layout" "==" "search") -}}
{{- if $query -}}
{{- $searchPage := index $query 0 -}}
<div id="search-modal-overlay" class="search-modal-overlay" data-json="{{ (index $searchPage.OutputFormats 1).Permalink }}">
    <div class="search-modal" id="search-modal">
        <div class="search-modal-header">
            <svg class="search-modal-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" class="search-modal-input" id="search-modal-input" placeholder="{{ T `search.placeholder` }}" autocomplete="off" />
            <kbd class="search-modal-kbd">ESC</kbd>
        </div>
        <div class="search-modal-results" id="search-modal-results"></div>
        <div class="search-modal-footer">
            <div class="search-modal-footer-hint">
                <kbd>↑↓</kbd>
                <span>导航</span>
            </div>
            <div class="search-modal-footer-hint">
                <kbd>↵</kbd>
                <span>打开</span>
            </div>
            <div class="search-modal-footer-hint">
                <kbd>ESC</kbd>
                <span>关闭</span>
            </div>
        </div>
    </div>
</div>
{{- end -}}
