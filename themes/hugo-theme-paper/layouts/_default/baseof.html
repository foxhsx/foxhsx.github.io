<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" dir="{{ default `ltr` .Language.LanguageDirection }}">
    <head>
        {{- partial "head/head.html" . -}}
        {{- block "head" . -}}{{ end }}
        <meta name="google-adsense-account" content="ca-pub-2054639233986036">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2054639233986036"
             crossorigin="anonymous"></script>
    </head>
    <body class="{{ block `body-class` . }}{{ end }}">
        {{- partial "head/colorScheme" . -}}
        {{- partial "navbar.html" . -}}

        <div class="container main-container {{ if .Scratch.Get `hasWidget` }}has-sidebar{{ else }}no-sidebar{{ end }}">
            <main class="main full-width {{ if .Scratch.Get `hasWidget` }}has-sidebar{{ end }}">
                {{- block "main" . }}{{- end }}
            </main>
            {{- block "right-sidebar" . -}}{{ end }}
        </div>
        {{ partial "search-modal.html" . }}
        {{ partial "footer/include.html" . }}
    </body>
</html>
