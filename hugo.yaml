baseurl: https://blog.ihsxu.com
languageCode: zh-cn
theme: hugo-theme-paper
title: 三金
copyright: Coder 小站
timeZone: Asia/Shanghai

# Theme i18n support
# Available values: ar, bn, ca, de, el, en, es, fr, hu, id, it, ja, ko, nl, pt-br, th, uk, zh-cn, zh-hk, zh-tw
DefaultContentLanguage: zh-cn

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage: true

languages:
    zh-cn:
        languageName: 中文
        title: 三金
        weight: 2
        params:
            sidebar:
                subtitle: 不要停止学习

services:
    # Change it to your Disqus shortname before using
    disqus:
        shortname: "hugo-theme-paper"
    # GA Tracking ID
    googleAnalytics:
        id: G-21TT6S3V8K

pagination:
    pagerSize: 10

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: # e.g.: favicon placed in `static/favicon.ico` of your site folder, then set this field to `/favicon.ico` (`/` is necessary)
    # https://tabler.io/icons

    footer:
        since: 2024
        customText:
        deployNotice: "Deployed on GitHub Pages"

    dateFormat:
        published: 2006-01-02
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        emoji: 🍥
        subtitle: 不要停止学习
        avatar:
            enabled: true
            local: true
            src: img/avatar.svg

    article:
        math: false
        toc: true
        readingTime: true
        license:
            enabled: false
            default: Licensed under CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider: disqus

        disqusjs:
            shortname:
            apiUrl:
            apiKey:
            admin:
            adminLabel:

        # github 评论，可以加一下
        utterances:
            repo:
            issueTerm: pathname
            label:

        beaudar:
            repo:
            issueTerm: pathname
            label:
            theme:

        remark42:
            host:
            site:
            locale:

        vssue:
            platform:
            owner:
            repo:
            clientId:
            clientSecret:
            autoCreateIssue: false

        # Waline client configuration see: https://waline.js.org/en/reference/component.html
        waline:
            serverURL:
            lang:
            pageview:
            emoji:
                - https://unpkg.com/@waline/emojis@1.0.1/weibo
            requiredMeta:
                - name
                - email
                - url
            locale:
                admin: Admin
                placeholder:

        twikoo:
            envId:
            region:
            path:
            lang:

        # See https://cactus.chat/docs/reference/web-client/#configuration for description of the various options
        cactus:
            defaultHomeserverUrl: "https://matrix.cactus.chat:8448"
            serverName: "cactus.chat"
            siteName: "" # You must insert a unique identifier here matching the one you registered (See https://cactus.chat/docs/getting-started/quick-start/#register-your-site)

        giscus:
            repo:
            repoID:
            category:
            categoryID:
            mapping:
            lightTheme:
            darkTheme:
            reactionsEnabled: 1
            emitMetadata: 0

        gitalk:
            owner:
            admin:
            repo:
            clientID:
            clientSecret:
            proxy:

        cusdis:
            host:
            id:
    widgets:
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: tag-cloud
              params:
                  limit: 10
            - type: wechat
              params:
                  personalLocal: true
                  officialAccountLocal: true
                  officialAccountImage: /img/officialAccountImage.jpg
                  personal: /img/personal.jpg
                  captionA: 公众号
                  captionB: 微信
        page:
            - type: toc

    opengraph:
        twitter:
            # Your Twitter username
            site:

            # Available values: summary, summary_large_image
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: auto

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

### Custom menu
### See https://stack.jimmycai.com/config/menu
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
menu:
    main:
        - identifier: archives
          name: 归档
          url: /archives/
          weight: -70
          params:
              icon: archives
        - identifier: tags
          name: 标签
          url: /tags/
          weight: -65
          params:
              icon: tag
        - identifier: about
          name: 关于
          url: /about/
          weight: -40
          params:
              icon: user
        - identifier: links
          name: 友链
          url: /links/
          weight: -50
          params:
              icon: link

    social:
        - identifier: github
          name: GitHub
          url: https://github.com/foxhsx
          params:
              icon: brand-github

        - identifier: twitter
          name: Twitter
          url: https://x.com/he_cecil
          params:
              icon: brand-twitter
    
        - identifier: 知乎
          name: 知乎
          url: https://www.zhihu.com/people/xiao-he-shang-14-8
          params:
              icon: brand-zhihu

        - identifier: 掘金
          name: 掘金
          url: https://juejin.cn/user/4406498335130216
          params:
              icon: brand-juejin

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                    inline:
                        - - \(
                          - \)
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 3
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: false
        lineNumbersInTable: true
        tabWidth: 4
