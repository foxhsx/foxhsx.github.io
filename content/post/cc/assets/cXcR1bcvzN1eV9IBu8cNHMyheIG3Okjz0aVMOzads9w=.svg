<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 38px 'Comic Sans MS', 'Marker Felt', sans-serif; fill: #1f2937; }
      .subtitle { font: 600 22px 'Comic Sans MS', 'Marker Felt', sans-serif; fill: #334155; }
      .text { font: 18px 'Comic Sans MS', 'Marker Felt', sans-serif; fill: #334155; }
      .small { font: 16px 'Comic Sans MS', 'Marker Felt', sans-serif; fill: #475569; }
      .line { stroke: #334155; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="#fffdf7"/>

  <text x="70" y="86" class="title">Claude Code 现在更适合看成四块</text>
  <text x="70" y="122" class="subtitle">和正文保持一致：不是拆很多层，而是先抓住四个最重要的部分</text>

  <rect x="92" y="176" rx="28" ry="28" width="460" height="210" fill="#fee2e2" stroke="#dc2626" stroke-width="3.5"/>
  <text x="180" y="236" class="title">① 入口和主循环</text>
  <text x="136" y="286" class="subtitle">`main.tsx` 把整套系统拉起来</text>
  <text x="136" y="322" class="text">`QueryEngine.ts` 像大脑一样驱动 Agent Loop</text>
  <text x="136" y="356" class="small">关键词：用户输入 → 模型判断 → 工具调用</text>

  <rect x="648" y="176" rx="28" ry="28" width="460" height="210" fill="#dbeafe" stroke="#2563eb" stroke-width="3.5"/>
  <text x="748" y="236" class="title">② 命令和工具</text>
  <text x="692" y="286" class="subtitle">`commands/` 更像用户入口</text>
  <text x="692" y="322" class="text">`tools/` 才是模型真正能调度的能力池</text>
  <text x="692" y="356" class="small">文件、搜索、shell、agent、MCP 都在这一层</text>

  <rect x="92" y="454" rx="28" ry="28" width="460" height="210" fill="#dcfce7" stroke="#16a34a" stroke-width="3.5"/>
  <text x="148" y="514" class="title">③ 服务、状态和会话</text>
  <text x="136" y="564" class="subtitle">真正把 Claude Code 做厚的地方</text>
  <text x="136" y="600" class="text">会话怎么续、状态怎么管、上下文怎么收</text>
  <text x="136" y="634" class="small">模型只是入口，长期稳定运行才是难点</text>

  <rect x="648" y="454" rx="28" ry="28" width="460" height="210" fill="#f5d0fe" stroke="#a21caf" stroke-width="3.5"/>
  <text x="748" y="514" class="title">④ 边界和交互</text>
  <text x="692" y="564" class="subtitle">权限、审批、plan mode、worktree</text>
  <text x="692" y="600" class="text">再加上 TUI、MCP、plugins、skills</text>
  <text x="692" y="634" class="small">说明它已经不是单一 CLI，而是在往平台化走</text>

  <path d="M552 282 C590 282, 610 282, 648 282" class="line"/>
  <path d="M552 560 C590 560, 610 560, 648 560" class="line"/>
  <path d="M322 386 C322 416, 322 430, 322 454" class="line"/>
  <path d="M878 386 C878 416, 878 430, 878 454" class="line"/>

  <rect x="156" y="742" rx="22" ry="22" width="888" height="88" fill="#f8fafc" stroke="#475569" stroke-width="2.5"/>
  <text x="320" y="794" class="subtitle">一眼看法：四块一起看，就够了</text>
</svg>
